<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de perfil</title>
    <!--Link CSS-->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="head">
        <div class="logotipo">Perfil</div>
        <nav class="nav">
            <a href="#">Inicio</a>
            <a href="#">Mi Perfil</a>
            <a href="#">Conexiones</a>
            <button class="btn">Cerrar Sesión</button>
        </nav>
    </header>

    <main class="contenedor-principal">
        <section class="tarjeta">
            <div class="perfil">
                <img src="static/images/images.png" alt="Perfil" class="img">
            </div>

            <div class="parrafo">
                <h1>Jane Doe</h1>
                <h2>Bergen, Noruega</h2>
                <p>Desarrolladora Frontend</p>
                <p>Conocimientos en HTML, CSS, JavaSript.</p>

            </div>
        </section>
        <section class="columna-derecha">
            <div class="tarjeta-conexiones">
                <div class="boton-1">
                    <h3>Solicitudes de conexión</h3>
                    <button class="btn-ver-todas">Ver todas</button>
                </div>
                <div class="btn-1">
                    <div class="btn-2">
                        <div class="row">
                            <img src="static/images/images (1).png" alt="Chuck" class="perfil">
                            <span>Steve Jobs</span>
                        </div>

                        <div class="accion">
                            <button class="btn-accion-aceptar">✓</button>
                            <button class="btn-accion-rechazar">✗</button>
                        </div>
                    </div>

                    <div class="btn-2">
                    <div class="row">
                        <img src="static/images/Bomb.webp" alt="Bomb" class="perfil">
                        <span>Bill Gates</span>
                    </div>

                    <div class="accion">
                        <button class="btn-accion-aceptar">✓</button>
                        <button class="btn-accion-rechazar">✗</button>
                    </div>
                    </div>
                </div>
            </div>
            <div class="tarjeta-conexiones">

                <div class="boton-1">
                    <h3>Tus conexiones</h3>
                    <button class="btn-ver-todas">Ver todas</button>
                </div>

                <div class="row">
                    <img src="static/images/Green_4.webp" alt="hal" class="perfil">
                    <span>Richard Stallman</span>
                </div>
                <div class="row">
                    <img src="static/images/images (2).png" alt="blue" class="perfil">
                    <span>Ada Lovelace</span>
                </div>
                <div class="row">
                    <img src="static/images/Orange.webp" alt="Bubu" class="perfil">
                    <span>Linus Torvalds</span>
                </div>
                <div class="row">
                    <img src="static/images/Stella_transparent.webp" alt="stella" class="perfil">
                    <span>Grace Hopper</span>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
